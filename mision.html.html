<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Misión - INTURMARY</title>

<link rel="stylesheet" href="styles.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

.page-banner{
height:100vh;
background:
linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url("https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=1200");
background-size:cover;
background-position:center;

display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
}

.content-box{
max-width:900px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(10px);
padding:50px;
border-radius:20px;
transition:.5s;
}

.content-box:hover{
transform:translateY(-10px);
box-shadow:0 0 30px #0056ff;
}

.content-box h1{
font-size:60px;
margin-bottom:20px;
transition:.5s;
}

.content-box h1:hover{
transform:scale(1.1);
color:#4da6ff;
}

.content-box p{
font-size:22px;
line-height:1.8;
}

.btn-back{
display:inline-block;
margin-top:30px;
padding:15px 30px;
background:#0056ff;
color:white;
text-decoration:none;
border-radius:30px;
transition:.4s;
}

.btn-back:hover{
transform:scale(1.1);
box-shadow:0 0 25px #0056ff;
}

</style>

</head>

<body>

<section class="page-banner">

<div class="content-box">

<h1>🎯 Nuestra Misión</h1>

<p>
Brindar educación tecnológica innovadora y accesible,
fortaleciendo las competencias digitales mediante cursos
prácticos, dinámicos y actualizados que impulsen el
crecimiento académico y profesional de nuestros estudiantes.
</p>

<a href="index.html" class="btn-back">
Volver al Inicio
</a>

</div>

</section>

</body>
</html>
